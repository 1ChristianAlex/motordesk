version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: motordesk_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: motordesk
      POSTGRES_PASSWORD: motordesk_pass
      POSTGRES_DB: motordesk
    ports:
      - "5432:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}" ]
      interval: 10s
      timeout: 5s
      retries: 5

